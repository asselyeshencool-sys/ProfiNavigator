<!DOCTYPE html><html lang="kk"><head><title>Мамандықтар — ProfiNavigator</title><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><link rel="stylesheet" href="css/variables.css"/><link rel="stylesheet" href="css/base.css"/><link rel="stylesheet" href="css/components.css"/><link rel="stylesheet" href="css/pages.css"/></head><body>
<header class="site-header"><div class="container header-inner"><a class="logo" href="index.html"><img class="logo-icon" src="assets/logo-icon.svg" width="36" height="36" alt="" />Profi<span>Navigator</span></a><button class="nav-toggle" aria-label="Мәзір">☰</button><nav class="nav-desktop"><a href="index.html">Басты</a><a href="test.html">Тест</a><a href="professions.html">Мамандықтар</a><a href="analytics.html">Аналитика</a><a href="compare.html">Салыстыру</a><a href="cabinet.html">Кабинет</a><span id="userNav"></span></nav></div></header>
<main class="container"><h1>Мамандықтар каталогы</h1>
<div class="filters-bar">
<div class="form-group"><label for="category">Сала</label><select id="category"><option value="">Барлығы</option></select></div>
<div class="form-group"><label for="demand">Сұраныс</label><select id="demand"><option value="">Барлығы</option><option value="high">Жоғары</option><option value="medium">Орташа</option><option value="low">Төмен</option></select></div>
<div class="form-group"><label for="search">Іздеу</label><input id="search" type="search" placeholder="Мамандық атауы..."/></div>
</div>
<div id="catalogGrid" class="card-grid"></div></main>
<footer class="site-footer"><div class="container">© 2026 ProfiNavigator</div></footer>
<script type="module">
import{initLayout}from"./js/main.js";
import{loadJSON}from"./js/utils.js";
import{bindCatalogFilters}from"./js/catalog.js";
initLayout("professions");
(async()=>{
const[{categories},{professions}]=await Promise.all([loadJSON("data/categories.json"),loadJSON("data/professions.json")]);
const sel=document.getElementById("category");
categories.forEach(c=>{const o=document.createElement("option");o.value=c.id;o.textContent=c.nameKk;sel.appendChild(o);});
bindCatalogFilters(professions,document.getElementById("catalogGrid"),{category:sel,demand:document.getElementById("demand"),search:document.getElementById("search")});
})();
</script></body></html>
